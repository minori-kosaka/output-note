<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>読後メモ | 読んで感じたこと</title>
    <meta name="description" content="読んで感じたことを、短く残せるフォームです。匿名でも入力できます。">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="読後メモ">
    <meta property="og:title" content="3分で書ける読後メモ">
    <meta property="og:description" content="印象に残ったこと、気づいたこと、最近のことを短く残せます。匿名OK。">
    <meta property="og:url" content="https://minori-kosaka.github.io/output-note/">
    <meta property="og:image" content="https://minori-kosaka.github.io/output-note/ogp.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="3分で書ける読後メモ">
    <meta name="twitter:description" content="印象に残ったこと、気づいたこと、最近のことを短く残せます。匿名OK。">
    <meta name="twitter:image" content="https://minori-kosaka.github.io/output-note/ogp.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <section class="form-shell" aria-labelledby="form-title">
        <header class="form-header">
          <h1 id="form-title">読んで感じたこと</h1>
          <p class="lead">
            印象に残ったことや気づいたことを、そのまま残してもらえたら嬉しいです。
          </p>
        </header>

        <form id="feedback-form" class="feedback-form">
          <div class="main-question">
            <textarea
              id="output"
              name="output"
              rows="8"
              required
              minlength="8"
              maxlength="2000"
              placeholder="印象に残ったこと、気づいたことなど"
            ></textarea>
          </div>

          <div class="sub-question">
            <label id="extra-prompt-label" for="extraAnswer">最近のこと</label>
            <textarea
              id="extraAnswer"
              name="extraAnswer"
              rows="3"
              maxlength="1200"
            ></textarea>
          </div>

          <div class="name-row">
            <label for="name">お名前またはニックネーム</label>
            <input id="name" name="name" type="text" maxlength="80" autocomplete="name">
          </div>

          <input id="extraPrompt" name="extraPrompt" type="hidden">
          <input id="source" name="source" type="hidden">
          <input id="pageUrl" name="pageUrl" type="hidden">

          <button id="submit-button" type="submit" aria-label="送信">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M3.7 11.2 20.1 4c.8-.4 1.7.4 1.3 1.2l-7.2 16.4c-.4.8-1.5.7-1.8-.1l-2.1-6.1-6.1-2.1c-.8-.3-.9-1.5-.1-1.8Z"/>
              <path d="m10.6 14.8 4.7-4.7"/>
            </svg>
            <span>送信</span>
          </button>
          <p id="form-status" class="status" role="status" aria-live="polite"></p>
        </form>
      </section>
      <p class="line-contact">
        レッスンの相談などは<a href="https://lin.ee/EhSYxLR" target="_blank" rel="noopener">公式LINE</a>へ
      </p>
    </main>

    <div id="thanks-modal" class="modal" hidden>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="thanks-title">
        <button class="modal-close" type="button" aria-label="閉じる">×</button>
        <h2 id="thanks-title">送信完了</h2>
        <p>ご質問・お問い合わせは公式LINEへどうぞ。</p>
        <a class="line-button" href="https://lin.ee/EhSYxLR" target="_blank" rel="noopener">公式LINEを開く</a>
      </div>
    </div>

    <script src="script.js?v=20260510-3"></script>
  </body>
</html>
